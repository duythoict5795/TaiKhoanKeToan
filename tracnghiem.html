<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Trắc Nghiệm Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; font-size: 13px; }
        .ql-editor { min-height: 60px; font-size: 13px; padding: 8px; }
        .ql-editor table { border-collapse: collapse; width: 100%; margin: 8px 0; }
        .ql-editor table td { border: 1px solid #cbd5e1; padding: 3px 6px; }
        .highlight { background-color: #fde047; font-weight: bold; border-radius: 2px; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .btn-primary { @apply bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition shadow-sm text-sm; }
        .btn-outline { @apply border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-lg font-medium hover:bg-slate-50 transition text-sm; }
        .question-card h3 { font-size: 14px; font-weight: 500; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-blue-800 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-lg font-bold flex items-center gap-2 cursor-pointer" onclick="showView('menu-view')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
                TRẮC NGHIỆM PRO
            </h1>
            <div id="nav-btns" class="hidden flex gap-2">
                <button onclick="showView('menu-view')" class="p-2 hover:bg-blue-700 rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full px-4 py-4">
        
        <!-- MENU CHÍNH -->
        <div id="menu-view" class="fade-in space-y-6 mt-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center text-center space-y-4">
                    <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">Quản Lý Ngân Hàng Câu Hỏi</h3>
                        <p class="text-slate-500 text-xs">Thêm, sửa, xóa và tìm kiếm câu hỏi.</p>
                    </div>
                    <button onclick="showView('review-view'); renderQuestionList();" class="btn-primary w-full">Vào Quản Lý</button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center text-center space-y-4">
                    <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">Luyện Tập</h3>
                        <p class="text-slate-500 text-xs">Bắt đầu bài trắc nghiệm theo phạm vi.</p>
                    </div>
                    <button onclick="openPracticeConfig()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-emerald-700 transition w-full text-sm">Bắt Đầu Học</button>
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 flex items-center justify-between">
                <div>
                    <span class="text-blue-800 font-bold" id="stats-count">0</span>
                    <span class="text-blue-600 text-xs ml-1">Câu hỏi hiện có</span>
                </div>
                <a href="index.html" class="text-blue-600 text-xs ml-1">Số Tài Khoản Kế Toán</a>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="btn-outline flex items-center gap-1 py-1 px-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg> Xuất File
                    </button>
                    <label class="btn-outline flex items-center gap-1 py-1 px-3 cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg> Nhập File
                        <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                    </label>
                </div>
            </div>
        </div>

        <!-- CẤU HÌNH LUYỆN TẬP -->
        <div id="config-view" class="hidden fade-in fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl space-y-4">
                <h3 class="text-lg font-bold">Cấu hình luyện tập</h3>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-slate-50">
                        <input type="radio" name="range-type" value="all" checked onchange="toggleRangeInputs()">
                        <span class="text-sm font-medium">Tất cả câu hỏi</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-slate-50">
                        <input type="radio" name="range-type" value="custom" onchange="toggleRangeInputs()">
                        <span class="text-sm font-medium">Theo phạm vi (Câu ... đến câu ...)</span>
                    </label>
                    <div id="range-inputs" class="hidden grid grid-cols-2 gap-2 pl-8">
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400">Từ câu</label>
                            <input type="number" id="range-from" value="1" min="1" class="w-full border rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400">Đến câu</label>
                            <input type="number" id="range-to" value="10" min="1" class="w-full border rounded-lg px-3 py-2 text-sm">
                        </div>
                    </div>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="document.getElementById('config-view').classList.add('hidden')" class="btn-outline flex-grow">Hủy</button>
                    <button onclick="startPracticeMode()" class="btn-primary flex-grow">Bắt Đầu</button>
                </div>
            </div>
        </div>

        <!-- REVIEW VIEW -->
        <div id="review-view" class="hidden fade-in space-y-4">
            <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-col md:flex-row gap-3">
                <div class="relative flex-grow">
                    <input type="text" id="search-input" oninput="renderQuestionList()" placeholder="Tìm kiếm không dấu..." class="w-full pl-4 pr-4 py-2 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
                <button onclick="showAddForm()" class="btn-primary whitespace-nowrap">Thêm Câu Hỏi Mới</button>
            </div>
            <div id="questions-list" class="space-y-3 pb-10"></div>
        </div>

        <!-- EDITOR VIEW -->
        <div id="editor-view" class="hidden fade-in bg-white p-5 rounded-xl border shadow-sm space-y-4">
            <h2 id="editor-title" class="text-lg font-bold">Thêm Câu Hỏi</h2>
            <input type="hidden" id="edit-q-id">
            
            <div class="space-y-1">
                <label class="text-[11px] font-bold text-slate-500 uppercase">Nội dung câu hỏi</label>
                <div id="q-editor-container" class="bg-white rounded-lg border overflow-hidden"></div>
            </div>
            
            <div class="space-y-3">
                <label class="text-[11px] font-bold text-slate-500 uppercase">Các đáp án (Chọn 1 câu đúng)</label>
                <div id="options-editor-list" class="space-y-2"></div>
                <button onclick="addOptionEditorField()" class="text-blue-600 text-[11px] font-bold">+ Thêm lựa chọn</button>
            </div>

            <div class="space-y-1">
                <label class="text-[11px] font-bold text-slate-500 uppercase">Giải thích</label>
                <div id="exp-editor-container" class="bg-white rounded-lg border overflow-hidden"></div>
            </div>

            <div class="flex justify-end gap-2 pt-4 border-t">
                <button onclick="showView('review-view')" class="btn-outline">Hủy</button>
                <button onclick="saveQuestion()" class="btn-primary px-8">Lưu Lại</button>
            </div>
        </div>

        <!-- PRACTICE VIEW -->
        <div id="practice-view" class="hidden fade-in space-y-4">
            <div class="flex justify-between items-center bg-white p-3 rounded-xl border shadow-sm">
                <div class="flex items-center gap-4">
                    <span id="timer-display" class="font-mono font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">00:00</span>
                    <span class="text-xs font-bold text-slate-500 uppercase">Câu <span id="current-q-num">1</span>/<span id="total-q-num">0</span></span>
                </div>
                <button onclick="endPractice()" class="text-rose-600 font-bold text-xs uppercase">Kết thúc</button>
            </div>
            <div id="practice-card" class="bg-white p-6 rounded-2xl border shadow-sm space-y-6">
                <div id="practice-q-content" class="ql-editor !p-0"></div>
                <div id="practice-options-list" class="grid grid-cols-1 gap-3"></div>
            </div>
        </div>

        <!-- RESULT VIEW -->
        <div id="result-view" class="hidden fade-in bg-white p-8 rounded-2xl border text-center space-y-6">
            <h2 class="text-2xl font-bold">Kết Quả Luyện Tập</h2>
            <div class="flex justify-center gap-4">
                <div class="p-4 bg-emerald-50 rounded-2xl w-28 border border-emerald-100">
                    <div class="text-3xl font-bold text-emerald-600" id="res-correct">0</div>
                    <div class="text-[10px] font-bold uppercase text-emerald-500">Đúng</div>
                </div>
                <div class="p-4 bg-rose-50 rounded-2xl w-28 border border-rose-100">
                    <div class="text-3xl font-bold text-rose-600" id="res-wrong">0</div>
                    <div class="text-[10px] font-bold uppercase text-rose-500">Sai</div>
                </div>
            </div>
            <div class="flex flex-col gap-2 max-w-xs mx-auto">
                <button id="btn-view-wrong" onclick="showWrongAnswers()" class="btn-outline border-rose-200 text-rose-600 hover:bg-rose-50">Xem Lại Câu Sai</button>
                <button onclick="showView('menu-view')" class="btn-primary">Quay Lại Menu</button>
            </div>
        </div>

        <!-- WRONG ANSWERS VIEW -->
        <div id="wrong-answers-view" class="hidden fade-in space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold text-rose-600 uppercase">Các câu đã trả lời sai</h2>
                <button onclick="showView('result-view')" class="text-slate-500 text-xs font-bold underline">Quay lại kết quả</button>
            </div>
            <div id="wrong-list" class="space-y-4"></div>
        </div>

    </main>

    <script>
        const quillConfig = { modules: { toolbar: [['bold', 'italic', 'underline'], [{ 'color': [] }, { 'background': [] }], ['clean']] }, theme: 'snow' };
        let qEditor, expEditor, questions = JSON.parse(localStorage.getItem('mcq_v2')) || [];
        let practiceState = { queue: [], current: 0, correct: 0, timer: null, seconds: 0, wrongAnswers: [] };

        window.onload = () => {
            qEditor = new Quill('#q-editor-container', quillConfig);
            expEditor = new Quill('#exp-editor-container', quillConfig);
            updateStats();
        };

        function showView(id) {
            ['menu-view', 'review-view', 'editor-view', 'practice-view', 'result-view', 'wrong-answers-view'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('nav-btns').classList.toggle('hidden', id === 'menu-view');
            if (id === 'menu-view') updateStats();
        }

        function updateStats() {
            document.getElementById('stats-count').innerText = questions.length;
        }

        function removeAccents(str) {
            return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : "";
        }

        // --- QUẢN LÝ DỮ LIỆU ---
        function exportData() {
            const dataStr = JSON.stringify(questions, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ngan_hang_cau_hoi_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        questions = imported;
                        localStorage.setItem('mcq_v2', JSON.stringify(questions));
                        alert("Đã nhập " + imported.length + " câu hỏi!");
                        updateStats();
                    }
                } catch (err) { alert("File không đúng định dạng!"); }
            };
            reader.readAsText(file);
        }

        // --- EDITOR ---
        function addOptionEditorField(content = '', isCorrect = false) {
            const container = document.getElementById('options-editor-list');
            const editorId = 'opt-' + Math.random().toString(36).substr(2, 9);
            const div = document.createElement('div');
            div.className = 'flex items-start gap-2 bg-slate-50 p-2 rounded-lg group';
            div.innerHTML = `
                <input type="radio" name="correct-radio" ${isCorrect ? 'checked' : ''} class="mt-2 h-4 w-4 text-blue-600">
                <div class="flex-grow bg-white border rounded"><div id="${editorId}"></div></div>
                <button onclick="this.parentElement.remove()" class="mt-2 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition">✕</button>
            `;
            container.appendChild(div);
            const editor = new Quill('#' + editorId, quillConfig);
            editor.root.innerHTML = content;
            div.dataset.editorId = editorId;
        }

        function showAddForm() {
            document.getElementById('editor-title').innerText = "Thêm Câu Hỏi Mới";
            document.getElementById('edit-q-id').value = "";
            qEditor.root.innerHTML = "";
            expEditor.root.innerHTML = "";
            document.getElementById('options-editor-list').innerHTML = "";
            addOptionEditorField('', true);
            addOptionEditorField();
            showView('editor-view');
        }

        function showEditForm(id) {
            const q = questions.find(item => item.id === id);
            if (!q) return;
            document.getElementById('editor-title').innerText = "Chỉnh Sửa Câu Hỏi";
            document.getElementById('edit-q-id').value = q.id;
            qEditor.root.innerHTML = q.text;
            expEditor.root.innerHTML = q.explanation || "";
            document.getElementById('options-editor-list').innerHTML = "";
            q.options.forEach(opt => addOptionEditorField(opt.text, opt.isCorrect));
            showView('editor-view');
        }

        function saveQuestion() {
            const id = document.getElementById('edit-q-id').value;
            const text = qEditor.root.innerHTML;
            const explanation = expEditor.root.innerHTML;
            const optionEls = document.querySelectorAll('#options-editor-list > div');
            const options = Array.from(optionEls).map(el => ({
                text: Quill.find(document.getElementById(el.dataset.editorId)).root.innerHTML,
                isCorrect: el.querySelector('input[type="radio"]').checked
            }));

            if (qEditor.getText().trim() === "" || options.length < 2) return alert("Vui lòng điền đủ câu hỏi và ít nhất 2 đáp án");
            
            const data = { id: id ? parseInt(id) : Date.now(), text, explanation, options };
            if (id) {
                const idx = questions.findIndex(q => q.id === parseInt(id));
                questions[idx] = data;
            } else {
                questions.push(data);
            }
            localStorage.setItem('mcq_v2', JSON.stringify(questions));
            showView('review-view');
            renderQuestionList();
        }

        function renderQuestionList() {
            const container = document.getElementById('questions-list');
            const search = removeAccents(document.getElementById('search-input').value);
            container.innerHTML = "";
            
            questions.filter(q => removeAccents(q.text).includes(search)).forEach((q, i) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl border shadow-sm relative group";
                div.innerHTML = `
                    <div class="pr-12">
                        <div class="text-[10px] text-slate-400 font-bold mb-1 uppercase">Câu số ${i+1}</div>
                        <div class="ql-editor !p-0 mb-2">${q.text}</div>
                        <div class="space-y-1">
                            ${q.options.map(o => `<div class="text-[12px] ${o.isCorrect ? 'text-emerald-600 font-bold' : 'text-slate-500'} flex gap-2"><span>${o.isCorrect ? '✓' : '○'}</span> <div class="ql-editor !p-0 !min-h-0">${o.text}</div></div>`).join('')}
                        </div>
                    </div>
                    <div class="absolute top-4 right-4 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition">
                        <button onclick="showEditForm(${q.id})" class="p-1.5 bg-blue-50 text-blue-600 rounded-lg">✎</button>
                        <button onclick="deleteQuestion(${q.id})" class="p-1.5 bg-rose-50 text-rose-600 rounded-lg">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function deleteQuestion(id) {
            if (confirm("Xóa câu hỏi này?")) {
                questions = questions.filter(q => q.id !== id);
                localStorage.setItem('mcq_v2', JSON.stringify(questions));
                renderQuestionList();
            }
        }

        // --- LUYỆN TẬP ---
        function openPracticeConfig() {
            if (questions.length === 0) return alert("Ngân hàng câu hỏi trống!");
            document.getElementById('range-to').value = questions.length;
            document.getElementById('config-view').classList.remove('hidden');
        }

        function toggleRangeInputs() {
            const isCustom = document.querySelector('input[name="range-type"]:checked').value === 'custom';
            document.getElementById('range-inputs').classList.toggle('hidden', !isCustom);
        }

        function startPracticeMode() {
            const rangeType = document.querySelector('input[name="range-type"]:checked').value;
            let pool = [...questions];
            
            if (rangeType === 'custom') {
                const from = parseInt(document.getElementById('range-from').value) - 1;
                const to = parseInt(document.getElementById('range-to').value);
                pool = questions.slice(Math.max(0, from), Math.min(questions.length, to));
            }

            if (pool.length === 0) return alert("Phạm vi không hợp lệ!");

            practiceState = {
                queue: pool.sort(() => Math.random() - 0.5),
                current: 0,
                correct: 0,
                seconds: 0,
                wrongAnswers: []
            };

            document.getElementById('config-view').classList.add('hidden');
            document.getElementById('total-q-num').innerText = practiceState.queue.length;
            showView('practice-view');
            
            clearInterval(practiceState.timer);
            practiceState.timer = setInterval(() => {
                practiceState.seconds++;
                const m = Math.floor(practiceState.seconds/60).toString().padStart(2,'0');
                const s = (practiceState.seconds%60).toString().padStart(2,'0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
            }, 1000);

            renderStep();
        }

        function renderStep() {
            const q = practiceState.queue[practiceState.current];
            document.getElementById('current-q-num').innerText = practiceState.current + 1;
            document.getElementById('practice-q-content').innerHTML = q.text;
            const list = document.getElementById('practice-options-list');
            list.innerHTML = "";
            
            [...q.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "p-4 text-left border-2 border-slate-100 rounded-xl hover:border-blue-200 hover:bg-blue-50 transition-all flex items-start gap-3";
                btn.innerHTML = `<div class="ql-editor !p-0 !min-h-0 flex-grow">${opt.text}</div>`;
                btn.onclick = () => handleAnswer(opt, btn, q);
                list.appendChild(btn);
            });
        }

        function handleAnswer(opt, btn, q) {
            const btns = document.querySelectorAll('#practice-options-list button');
            btns.forEach(b => b.disabled = true);

            if (opt.isCorrect) {
                practiceState.correct++;
                btn.classList.add('!border-emerald-500', '!bg-emerald-50', 'text-emerald-700');
            } else {
                practiceState.wrongAnswers.push({ ...q, chosen: opt.text });
                btn.classList.add('!border-rose-500', '!bg-rose-50', 'text-rose-700');
                btns.forEach(b => {
                    const text = b.querySelector('.ql-editor').innerHTML;
                    if (q.options.find(o => o.text === text && o.isCorrect)) {
                        b.classList.add('!border-emerald-500', '!bg-emerald-50');
                    }
                });
            }

            setTimeout(() => {
                practiceState.current++;
                if (practiceState.current < practiceState.queue.length) renderStep();
                else endPractice();
            }, 1200);
        }

        function endPractice() {
            clearInterval(practiceState.timer);
            document.getElementById('res-correct').innerText = practiceState.correct;
            document.getElementById('res-wrong').innerText = practiceState.queue.length - practiceState.correct;
            document.getElementById('btn-view-wrong').classList.toggle('hidden', practiceState.wrongAnswers.length === 0);
            showView('result-view');
        }

        function showWrongAnswers() {
            const container = document.getElementById('wrong-list');
            container.innerHTML = "";
            practiceState.wrongAnswers.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl border border-rose-100 shadow-sm";
                div.innerHTML = `
                    <div class="text-[10px] font-bold text-rose-400 mb-2 uppercase">Câu sai #${i+1}</div>
                    <div class="ql-editor !p-0 mb-3">${q.text}</div>
                    <div class="space-y-2">
                        <div class="text-xs p-2 bg-rose-50 text-rose-700 rounded-lg border border-rose-100 flex gap-2">
                            <span class="font-bold">Đã chọn:</span> <div class="ql-editor !p-0 !min-h-0">${q.chosen}</div>
                        </div>
                        <div class="text-xs p-2 bg-emerald-50 text-emerald-700 rounded-lg border border-emerald-100 flex gap-2">
                            <span class="font-bold">Đáp án đúng:</span> <div class="ql-editor !p-0 !min-h-0">${q.options.find(o=>o.isCorrect).text}</div>
                        </div>
                    </div>
                    ${q.explanation && q.explanation !== '<p><br></p>' ? `<div class="mt-3 text-[11px] text-slate-500 bg-slate-50 p-2 rounded-lg italic">Giải thích: ${q.explanation}</div>` : ''}
                `;
                container.appendChild(div);
            });
            showView('wrong-answers-view');
        }
    </script>
</body>
</html>
