<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu Tài khoản Kế toán TT 99/2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .acc-row:hover { background-color: #f8fafc; }
        .favorite-star { color: #f59e0b; }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .scale-in { animation: scaleIn 0.2s ease-out forwards; }
        .highlight { background-color: #fef08a; font-weight: 700; color: #b45309; padding: 0 2px; border-radius: 2px; }
        .level-2 { padding-left: 2rem; position: relative; }
        .level-2::before { content: ""; position: absolute; left: 0.75rem; top: 0; bottom: 0; width: 2px; background-color: #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="antialiased text-slate-800 bg-slate-50 min-h-screen" onload="initApp()">

    <!-- Header -->

        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />

                </div>
                <div>

            </div>
            
            <div class="relative">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />

                    </svg>
                </button>
                
                <!-- Settings Dropdown -->
                <div id="settingsMenu" class="hidden absolute right-0 mt-3 w-56 bg-white border border-slate-200 rounded-2xl shadow-xl py-2 z-[110] scale-in">
                    <button onclick="exportData()" class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-3">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        Xuất dữ liệu (JSON)
                    </button>
                    <button onclick="triggerImport()" class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-3">
                        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                        Nhập dữ liệu mới
                    </button>
                    <hr class="my-1 border-slate-100">
                    <button onclick="openAddModal()" class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-3">
                        <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                        Thêm tài khoản thủ công
                    </button>
                </div>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Search area -->
        <div class="mb-10 text-center">
            <div class="relative max-w-2xl mx-auto group">
                <input type="text" id="searchInput" 
                    class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all text-lg"
                    placeholder="Tìm theo số hiệu, tên hoặc ĐỀ BÀI nghiệp vụ..."
                    onkeyup="handleSearch()">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
            <p id="searchHint" class="mt-3 text-sm text-slate-500 italic">Ví dụ định khoản chỉ hiện ra khi tìm kiếm từ khóa khớp với Đề bài.</p>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/80 border-b border-slate-200">
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest text-center w-24">Số hiệu</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Tên Tài Khoản</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest w-40">Quy tắc</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest text-right w-20"></th>
                        </tr>
                    </thead>
                    <tbody id="accountBody" class="divide-y divide-slate-100">
                        <!-- Content via JS -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden py-20 text-center">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-slate-100 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <p class="text-slate-500 font-medium">Không tìm thấy tài khoản nào phù hợp.</p>
            </div>
        </div>
    </main>

    <!-- Modal Quản Lý Ví Dụ -->
    <div id="exampleModal" class="fixed inset-0 z-[120] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-2xl p-8 shadow-2xl scale-in flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-start mb-4 shrink-0">
                <div>
                    <h3 class="text-2xl font-bold text-slate-900" id="exampleModalTitle">Quản lý nghiệp vụ</h3>
                    <p class="text-sm text-slate-500 mt-1">Cặp Đề bài - Đáp án tra cứu nhanh.</p>
                </div>
                <button onclick="closeExampleModal()" class="p-2 text-slate-400 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div id="existingExamplesList" class="flex-1 overflow-y-auto custom-scrollbar pr-2 mb-6 space-y-3"></div>
            <div class="bg-blue-50 border border-blue-100 p-5 rounded-2xl shrink-0">
                <div class="space-y-3">
                    <textarea id="exQuestion" rows="2" class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl outline-none transition-all resize-none text-sm" placeholder="Nhập Đề bài ví dụ..."></textarea>
                    <input type="text" id="exAnswer" class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl outline-none text-sm font-mono text-blue-700" placeholder="Nhập cách định khoản (Đáp án)...">
                    <button onclick="addNewExample()" class="w-full py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-md text-sm"> + Lưu Ví Dụ </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Thêm Tài Khoản -->
    <div id="addModal" class="fixed inset-0 z-[120] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl scale-in">
            <h3 class="text-2xl font-bold text-slate-900 mb-6">Thêm tài khoản mới</h3>
            <div class="space-y-4">
                <input type="text" id="newId" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Số hiệu tài khoản (VD: 1111)">
                <input type="text" id="newName" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Tên tài khoản">
                <select id="newRule" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="inc_dr">Tăng ghi Nợ / Giảm ghi Có</option>
                    <option value="inc_cr">Tăng ghi Có / Giảm ghi Nợ</option>
                    <option value="other">Loại kết chuyển / Trung gian</option>
                </select>
                <label class="flex items-center gap-2 cursor-pointer p-1">
                    <input type="checkbox" id="isFav" class="w-5 h-5 rounded text-blue-600">
                    <span class="text-slate-600 font-medium">Đánh dấu thông dụng</span>
                </label>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeAddModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold">Hủy</button>
                <button onclick="saveNewAccount()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Lưu</button>
            </div>
        </div>
    </div>

        let rawData = [];
        let activeModalAccId = null;

        function initApp() {
            const savedData = localStorage.getItem('ketoanData_v4');
            rawData = savedData ? JSON.parse(savedData) : [...defaultData];
            renderList(rawData);
            updateStats();
        }

        function saveData() {
            localStorage.setItem('ketoanData_v4', JSON.stringify(rawData));
            updateStats();
        }

        function updateStats() {
            const cap1 = rawData.filter(a => a.level === 1).length;
            const cap2 = rawData.filter(a => a.level === 2).length;
            document.getElementById('totalStats').innerText = `(${cap1} Cấp 1 | ${cap2} Cấp 2)`;
        }

        function getRuleHTML(rule) {
            if (rule === 'inc_dr') return '<span class="text-green-600 font-bold">Nợ &uarr;</span> / <span class="text-red-500 font-bold">Có &darr;</span>';
            if (rule === 'inc_cr') return '<span class="text-red-600 font-bold">Nợ &darr;</span> / <span class="text-green-600 font-bold">Có &uarr;</span>';
            return '<span class="text-slate-400 italic">Kết chuyển</span>';
        }

        function highlightText(text, query) {
            if (!query || !text) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function renderList(list, query = "") {
            const body = document.getElementById('accountBody');
            const empty = document.getElementById('emptyState');
            
            if (list.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            
            empty.classList.add('hidden');
            let html = '';
            list.forEach(acc => {
                const isLevel2 = acc.level === 2;
                let examplesHTML = '';
                if (query && acc.examples && acc.examples.length > 0) {
                    const matched = acc.examples.filter(ex => ex.question.toLowerCase().includes(query));
                    if (matched.length > 0) {
                        examplesHTML += `<div class="mt-3 space-y-2">`;
                        matched.forEach(ex => {
                            examplesHTML += `
                                <div class="bg-yellow-50 border border-yellow-200 p-3 rounded-lg text-sm shadow-sm scale-in">
                                    <div class="font-bold text-yellow-800 mb-1 border-b border-yellow-100 pb-1">Đề bài: <span class="font-normal text-slate-700">${highlightText(ex.question, query)}</span></div>
                                    <div class="font-bold text-green-700 mt-1">Đáp án: <span class="font-mono text-slate-900">${ex.answer}</span></div>
                                </div>`;
                        });
                        examplesHTML += `</div>`;
                    }
                }
                
                html += `
                    <tr class="acc-row transition-all cursor-pointer ${isLevel2 ? 'bg-slate-50/50' : ''}" onclick="openExampleModal('${acc.id}', event)">
                        <td class="px-6 py-4 font-mono font-bold text-blue-600 text-center text-sm">${highlightText(acc.id, query)}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2 ${isLevel2 ? 'level-2 text-sm' : 'font-semibold text-slate-800'}">
                                <span>${highlightText(acc.name, query)}</span>
                                ${acc.isFavorite ? '<span class="favorite-star text-sm">★</span>' : ''}
                                ${acc.examples && acc.examples.length > 0 ? `<span class="ml-2 text-[10px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded-md">${acc.examples.length} VD</span>` : ''}
                            </div>
                            ${examplesHTML}
                        </td>
                        <td class="px-6 py-4 text-xs whitespace-nowrap">${getRuleHTML(acc.rule)}</td>
                        <td class="px-6 py-4 text-right">
                             <button onclick="confirmDelete('${acc.id}', event)" class="p-2 text-slate-300 hover:text-red-500 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                             </button>
                        </td>
                    </tr>`;
            });
            body.innerHTML = html;
        }

        function handleSearch() {
            const input = document.getElementById('searchInput');
            const val = input.value.toLowerCase().trim();
            if (!val) { renderList(rawData); return; }
            const filtered = rawData.filter(a => a.id.includes(val) || a.name.toLowerCase().includes(val) || (a.examples && a.examples.some(ex => ex.question.toLowerCase().includes(val))));
            renderList(filtered, val);
        }

        function toggleSettingsMenu() {
            document.getElementById('settingsMenu').classList.toggle('hidden');
        }

        window.onclick = function(event) {
            if (!event.target.closest('.relative')) {
                document.getElementById('settingsMenu').classList.add('hidden');
            }
        }

        // --- Import/Export ---
        function exportData() {
            const dataStr = JSON.stringify(rawData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "tai_khoan_ke_toan.json";
            link.click();
            URL.revokeObjectURL(url);
            toggleSettingsMenu();
            showMessage("Đã xuất dữ liệu thành công!");
        }

        function triggerImport() {
            document.getElementById('importFile').click();
            toggleSettingsMenu();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        // XÓA TẤT CẢ VÀ NẠP MỚI
                        rawData = imported;
                        saveData();
                        handleSearch();
                        showMessage("Đã nạp dữ liệu mới thành công!");
                    } else {
                        showMessage("File không đúng cấu trúc!", "error");
                    }
                } catch (err) {
                    showMessage("Lỗi khi đọc file!", "error");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        }

        // --- Ví dụ ---
        function openExampleModal(id, event) {
            if(event.target.closest('button')) return;
            activeModalAccId = id;
            const acc = rawData.find(a => a.id === id);
            document.getElementById('exampleModalTitle').innerText = `TK ${acc.id} - ${acc.name}`;
            renderModalExamples(acc);
            document.getElementById('exampleModal').classList.remove('hidden');
        }

        function renderModalExamples(acc) {
            const list = document.getElementById('existingExamplesList');
            if(!acc.examples || acc.examples.length === 0) {
                list.innerHTML = `<div class="text-center py-6 text-slate-400 italic">Chưa có ví dụ.</div>`;
                return;
            }
            list.innerHTML = acc.examples.map((ex, i) => `
                <div class="bg-white border border-slate-200 p-4 rounded-xl relative group">
                    <button onclick="deleteExample(${i})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                    <div class="text-sm font-bold text-slate-800">Đề bài: <span class="font-normal">${ex.question}</span></div>
                    <div class="text-sm font-mono text-blue-700 bg-blue-50 p-2 rounded mt-2">Đáp án: ${ex.answer}</div>
                </div>`).join('');
        }

        function addNewExample() {
            const q = document.getElementById('exQuestion').value.trim();
            const a = document.getElementById('exAnswer').value.trim();
            if(!q || !a) return;
            const idx = rawData.findIndex(acc => acc.id === activeModalAccId);
            rawData[idx].examples.push({ question: q, answer: a });
            saveData();
            renderModalExamples(rawData[idx]);
            document.getElementById('exQuestion').value = "";
            document.getElementById('exAnswer').value = "";
            handleSearch();
        }

        function deleteExample(i) {
            const idx = rawData.findIndex(acc => acc.id === activeModalAccId);
            rawData[idx].examples.splice(i, 1);
            saveData();
            renderModalExamples(rawData[idx]);
            handleSearch();
        }

        function closeExampleModal() { document.getElementById('exampleModal').classList.add('hidden'); }
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); toggleSettingsMenu(); }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }

        function saveNewAccount() {
            const id = document.getElementById('newId').value.trim();
            const name = document.getElementById('newName').value.trim();
            if(!id || !name) return;
            rawData.unshift({ id, name, rule: document.getElementById('newRule').value, level: id.length > 3 ? 2 : 1, isFavorite: document.getElementById('isFav').checked, examples: [] });
            rawData.sort((a,b) => a.id.localeCompare(b.id));
            saveData();
            handleSearch();
            closeAddModal();
        }

        function confirmDelete(id, event) {
            event.stopPropagation();
            if(confirm(`Xóa tài khoản ${id}?`)) {
                rawData = rawData.filter(a => a.id !== id);
                saveData();
                handleSearch();
            }
        }

        function showMessage(msg, type = "success") {
            const t = document.createElement('div');
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl shadow-xl text-white font-bold z-[200] scale-in ${type === 'success' ? 'bg-slate-900' : 'bg-red-600'}`;
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }
    </script>
</body>
</html>
