<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tra cứu Tài khoản Kế toán TT 99/2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
        
        :root {
            --primary: #2563eb;
            --bg-body: #f8fafc;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        
        .transition-all-200 { transition: all 0.2s ease-in-out; }

        .acc-row:active { background-color: #f1f5f9; }
        @media (min-width: 768px) {
            .acc-row:hover { background-color: #f1f5f9; }
        }

        .favorite-star { color: #f59e0b; }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .scale-in { animation: scaleIn 0.2s ease-out forwards; }

        .highlight { background-color: #fef08a; font-weight: 700; color: #b45309; padding: 0 1px; border-radius: 2px; }
        
        /* Layout optimization */
        table { table-layout: fixed; width: 100%; border-spacing: 0; }
        .col-id { width: 65px; }
        .col-rule { width: 85px; }
        
        @media (max-width: 640px) {
            .col-id { width: 60px; }
            .col-rule { width: 80px; }
            .text-acc-name { font-size: 0.85rem; line-height: 1.25; }
            .text-acc-id { font-size: 0.9rem; }
        }

        .level-2 { padding-left: 0.75rem; position: relative; }
        .level-2::before { 
            content: ""; 
            position: absolute; 
            left: 0.25rem; 
            top: 0; 
            bottom: 0; 
            width: 2px; 
            background-color: #e2e8f0; 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #mainHeader { transition: transform 0.3s ease, opacity 0.3s ease; }
        .header-hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        
        #searchContainer { transition: all 0.3s ease; }
        .search-sticky { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            z-index: 100; 
            padding: 0.5rem 1rem; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .modal-open { overflow: hidden; }

        .filter-chip {
            white-space: nowrap;
            padding: 0.4rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            flex-shrink: 0;
        }
        .filter-chip.active {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .arrow-up { font-size: 1.1rem; vertical-align: middle; line-height: 1; }
        .arrow-down { font-size: 1.1rem; vertical-align: middle; line-height: 1; }

        /* Định dạng link tài khoản trong ví dụ */
        .acc-link {
            color: #2563eb;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
        }
        .acc-link:hover {
            color: #1e40af;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="antialiased text-slate-800 min-h-screen flex flex-col" onload="initApp()">

    <!-- Header -->

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                </div>
                <h1 class="text-sm font-bold text-slate-900 uppercase tracking-tight">Thông tư 99/2025</h1>
            </div>
            
            <div class="relative">
                <button onclick="toggleSettingsMenu()" class="p-2 bg-slate-50 border border-slate-200 text-slate-600 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    </svg>
                </button>
                <div id="settingsMenu" class="hidden absolute right-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl py-1 z-[110] scale-in origin-top-right">
                    <button onclick="exportData()" class="w-full text-left px-4 py-2.5 text-xs font-medium hover:bg-slate-50">Xuất Dữ liệu (JSON)</button>
                    <button onclick="triggerImport()" class="w-full text-left px-4 py-2.5 text-xs font-medium hover:bg-slate-50">Nhập Dữ liệu (JSON)</button>
                    <hr class="my-1 border-slate-100">
                    <button onclick="openAddModal()" class="w-full text-left px-4 py-2.5 text-xs font-bold text-blue-600 hover:bg-blue-50">+ Thêm Tài khoản</button>
                </div>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </header>

    <!-- Search & Filters -->
    <div id="stickySearchWrapper" class="z-[100]">
        <div id="searchContainer" class="max-w-6xl mx-auto px-4 py-4">
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="searchInput" 
                    class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl shadow-sm outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-500 transition-all text-sm"
                    placeholder="Tìm mã hoặc tên tài khoản..."
                    onkeyup="handleSearch()"
                    enterkeyhint="search">
                <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>

            <div id="filterMenu" class="mt-3 flex items-center gap-1.5 overflow-x-auto no-scrollbar pb-1">
                <button onclick="setFilter('all')" class="filter-chip active" id="filter-all">Tất cả</button>
                <button onclick="setFilter('fav')" class="filter-chip flex items-center gap-1" id="filter-fav">
                    <span class="favorite-star text-[10px]">★</span> Hay dùng
                </button>
                <div class="h-3 w-px bg-slate-200 mx-1 shrink-0"></div>
                <div id="groupButtons" class="flex gap-1.5"></div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <main class="flex-1 max-w-6xl mx-auto w-full px-2 pb-8">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200">
                        <th class="col-id px-2 py-3 text-[10px] font-bold text-slate-500 uppercase text-center">Mã</th>
                        <th class="px-3 py-3 text-[10px] font-bold text-slate-500 uppercase text-left">
                            <div class="flex items-center justify-between gap-2">
                                <span>Tên tài khoản</span>
                                <span id="accountCounter" class="text-[9px] font-semibold text-blue-500 normal-case bg-blue-50 px-1.5 py-0.5 rounded border border-blue-100 whitespace-nowrap">
                                    0 cấp 1, 0 cấp 2
                                </span>
                            </div>
                        </th>
                        <th class="col-rule px-2 py-3 text-[10px] font-bold text-slate-500 uppercase text-center">Quy tắc</th>
                    </tr>
                </thead>
                <tbody id="accountBody" class="divide-y divide-slate-100"></tbody>
            </table>
            <div id="emptyState" class="hidden py-12 text-center text-slate-400 text-sm">Không tìm thấy tài khoản.</div>
        </div>
    </main>

    <!-- Modal Chi tiết -->
    <div id="exampleModal" class="fixed inset-0 z-[120] hidden flex items-end sm:items-center justify-center p-0 sm:p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-xl p-5 shadow-2xl scale-in flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-base font-bold text-slate-900 pr-4" id="exampleModalTitle">Tài khoản</h3>
                <div class="flex gap-2">
                    <button onclick="deleteAccount()" class="p-1.5 text-red-400 hover:bg-red-50 rounded-full">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                    <button onclick="closeExampleModal()" class="p-1.5 text-slate-400 hover:bg-slate-100 rounded-full">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
            </div>
            <div id="existingExamplesList" class="flex-1 overflow-y-auto no-scrollbar mb-4 space-y-2"></div>
            <div class="bg-blue-50 p-3 rounded-xl space-y-2">
                <textarea id="exQuestion" rows="2" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-xs outline-none" placeholder="Nhập nghiệp vụ ví dụ..."></textarea>
                <textarea id="exAnswer" rows="2" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-xs font-mono outline-none" placeholder="Định khoản (VD: N111/C112) - Xuống dòng được"></textarea>
                <button onclick="addNewExample()" class="w-full py-2 bg-blue-600 text-white rounded-lg font-bold text-xs shadow-sm">Lưu ví dụ</button>
            </div>
        </div>
    </div>

    <!-- Modal Thêm -->
    <div id="addModal" class="fixed inset-0 z-[120] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-xl w-full max-w-xs p-5 shadow-2xl scale-in">
            <h3 class="text-sm font-bold text-slate-900 mb-4 uppercase">Thêm tài khoản mới</h3>
            <div class="space-y-3">
                <input type="text" id="newId" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Số hiệu tài khoản">
                <input type="text" id="newName" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Tên tài khoản">
                <select id="newRule" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none">
                    <option value="inc_dr">Nợ (+) Tăng / Có (-) Giảm</option>
                    <option value="inc_cr">Có (+) Tăng / Nợ (-) Giảm</option>
                    <option value="other">Tài khoản trung gian</option>
                </select>
                <label class="flex items-center gap-2 cursor-pointer pt-1">
                    <input type="checkbox" id="isFav" class="w-4 h-4 rounded text-blue-600">
                    <span class="text-xs text-slate-600">Đánh dấu hay dùng</span>
                </label>
            </div>
            <div class="flex gap-2 mt-5">
                <button onclick="closeAddModal()" class="flex-1 py-2 bg-slate-100 text-slate-600 rounded-lg font-bold text-xs">Hủy</button>
                <button onclick="saveNewAccount()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold text-xs">Lưu</button>
            </div>
        </div>
    </div>

        let rawData = [];
        let currentFilter = 'all'; 
        let activeModalAccId = null;

        function initApp() {
            const savedData = localStorage.getItem('ketoanData_v99');
            rawData = savedData ? JSON.parse(savedData) : [...defaultData];
            
            const groupContainer = document.getElementById('groupButtons');
            for(let i=1; i<=9; i++) {
                groupContainer.innerHTML += `<button onclick="setFilter('group-${i}')" class="filter-chip" id="filter-group-${i}">${i}</button>`;
            }

            renderList(rawData);
            setupScrollListener();
        }

        function setupScrollListener() {
            const header = document.getElementById('mainHeader');
            const searchCont = document.getElementById('searchContainer');
            window.addEventListener('scroll', () => {
                let st = window.pageYOffset || document.documentElement.scrollTop;
                if (st > 40) {
                    header.classList.add('header-hidden');
                    searchCont.classList.add('search-sticky');
                } else {
                    header.classList.remove('header-hidden');
                    searchCont.classList.remove('search-sticky');
                }
            });
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-chip').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${type}`).classList.add('active');
            handleSearch();
        }

        function handleSearch(customQuery = null) {
            const input = document.getElementById('searchInput');
            if (customQuery !== null) {
                input.value = customQuery;
            }
            const query = input.value.toLowerCase().trim();
            
            let filtered = rawData;
            
            if (currentFilter === 'fav') filtered = filtered.filter(a => a.isFavorite);
            else if (currentFilter.startsWith('group-')) {
                const num = currentFilter.split('-')[1];
                filtered = filtered.filter(a => a.id.startsWith(num));
            }

            if (query) {
                const results = filtered.map(acc => {
                    let score = -1;
                    const id = acc.id.toLowerCase();
                    const name = acc.name.toLowerCase();
                    
                    if (id.startsWith(query)) score = 100 - (id.length - query.length); 
                    else if (id.includes(query)) score = 80;
                    else if (name.includes(query)) score = 60;
                    else if (acc.examples && acc.examples.some(ex => 
                        ex.question.toLowerCase().includes(query) || ex.answer.toLowerCase().includes(query)
                    )) score = 40;

                    return { ...acc, _score: score };
                });

                filtered = results
                    .filter(r => r._score > -1)
                    .sort((a, b) => b._score - a._score || a.id.localeCompare(b.id, undefined, {numeric: true}));
            } else {
                filtered.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));
            }
            
            renderList(filtered, query);
        }

        function updateCounter(list) {
            const l1 = list.filter(a => a.id.length <= 3).length;
            const l2 = list.filter(a => a.id.length > 3).length;
            const counterEl = document.getElementById('accountCounter');
            counterEl.innerHTML = `${l1} cấp 1, ${l2} cấp 2`;
        }

        function renderList(list, query = "") {
            const body = document.getElementById('accountBody');
            const empty = document.getElementById('emptyState');
            
            updateCounter(list);

            if (list.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            let html = '';
            list.forEach(acc => {
                const isL2 = acc.level === 2 || acc.id.length > 3;
                html += `
                    <tr class="acc-row transition-all-200 cursor-pointer ${isL2 ? 'bg-slate-50/50' : ''}" onclick="openExampleModal('${acc.id}', event)">
                        <td class="px-1 py-3 font-mono font-bold text-blue-600 text-center text-acc-id truncate">${highlightText(acc.id, query)}</td>
                        <td class="px-3 py-3">
                            <div class="flex items-center gap-1.5 ${isL2 ? 'level-2' : ''} text-acc-name text-slate-800 font-medium">
                                <span class="break-words">${highlightText(acc.name, query)}</span>
                                ${acc.isFavorite ? '<span class="favorite-star text-[9px]">★</span>' : ''}
                            </div>
                        </td>
                        <td class="px-1 py-3 text-center">${getRuleHTML(acc.rule)}</td>
                    </tr>`;
            });
            body.innerHTML = html;
        }

        function highlightText(text, query) {
            if (!query || !text) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // Tự động nhận diện tài khoản và biến thành link
        function formatAccountingCode(text) {
            if (!text) return '';
            // Nhận diện các chuỗi số từ 3 chữ số trở lên (mã tài khoản)
            const regex = /(\b\d{3,}\b)/g;
            // Chuyển xuống dòng và tạo link
            return text.replace(/\n/g, '<br>').replace(regex, '<span class="acc-link" onclick="jumpToAccount(\'$1\', event)">$1</span>');
        }

        function jumpToAccount(id, event) {
            if (event) event.stopPropagation();
            closeExampleModal();
            setFilter('all');
            handleSearch(id);
            // Cuộn lên đầu trang để thấy kết quả
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function getRuleHTML(rule) {
            if (rule === 'inc_dr') return `
                <div class="flex flex-col items-center justify-center leading-none">
                    <span class="text-green-600 font-bold text-[10px]">Nợ <span class="arrow-up">↑</span></span>
                    <span class="text-red-400 text-[10px] mt-0.5">Có <span class="arrow-down">↓</span></span>
                </div>`;
            if (rule === 'inc_cr') return `
                <div class="flex flex-col items-center justify-center leading-none">
                    <span class="text-red-400 text-[10px]">Nợ <span class="arrow-down">↓</span></span>
                    <span class="text-green-600 font-bold text-[10px] mt-0.5">Có <span class="arrow-up">↑</span></span>
                </div>`;
            return '<span class="text-slate-400 text-[9px] font-medium">TG</span>';
        }

        function saveData() {
            localStorage.setItem('ketoanData_v99', JSON.stringify(rawData));
        }

        function openExampleModal(id, event) {
            activeModalAccId = id;
            const acc = rawData.find(a => a.id === id);
            document.getElementById('exampleModalTitle').innerText = `TK ${acc.id}: ${acc.name}`;
            renderModalExamples(acc);
            document.getElementById('exampleModal').classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function renderModalExamples(acc) {
            const list = document.getElementById('existingExamplesList');
            if(!acc.examples || acc.examples.length === 0) {
                list.innerHTML = `<div class="text-center py-8 text-slate-400 text-xs italic">Chưa có ví dụ cho tài khoản này.</div>`;
                return;
            }
            list.innerHTML = acc.examples.map((ex, i) => `
                <div class="bg-slate-50 border border-slate-100 p-3 rounded-lg relative shadow-sm">
                    <button onclick="deleteExample(${i})" class="absolute top-2 right-2 text-slate-300 hover:text-red-400">×</button>
                    <div class="text-xs font-semibold text-slate-700 leading-tight pr-4">${ex.question}</div>
                    <div class="text-[10px] font-mono text-slate-600 mt-2 bg-white p-2 rounded border border-blue-50 leading-relaxed">
                        ${formatAccountingCode(ex.answer)}
                    </div>
                </div>`).join('');
        }

        function addNewExample() {
            const q = document.getElementById('exQuestion').value.trim();
            const a = document.getElementById('exAnswer').value.trim();
            if(!q || !a) return;
            const idx = rawData.findIndex(acc => acc.id === activeModalAccId);
            if (!rawData[idx].examples) rawData[idx].examples = [];
            rawData[idx].examples.push({ question: q, answer: a });
            saveData();
            renderModalExamples(rawData[idx]);
            document.getElementById('exQuestion').value = "";
            document.getElementById('exAnswer').value = "";
        }

        function deleteExample(i) {
            const idx = rawData.findIndex(acc => acc.id === activeModalAccId);
            rawData[idx].examples.splice(i, 1);
            saveData();
            renderModalExamples(rawData[idx]);
        }

        function deleteAccount() {
            if(confirm("Xóa tài khoản này?")) {
                rawData = rawData.filter(a => a.id !== activeModalAccId);
                saveData();
                handleSearch();
                closeExampleModal();
            }
        }

        function closeExampleModal() { 
            document.getElementById('exampleModal').classList.add('hidden'); 
            document.body.classList.remove('modal-open');
        }

        function openAddModal() { 
            document.getElementById('addModal').classList.remove('hidden'); 
            document.body.classList.add('modal-open');
            toggleSettingsMenu(); 
        }

        function closeAddModal() { 
            document.getElementById('addModal').classList.add('hidden'); 
            document.body.classList.remove('modal-open');
        }

        function saveNewAccount() {
            const id = document.getElementById('newId').value.trim();
            const name = document.getElementById('newName').value.trim();
            if(!id || !name) return;
            rawData.push({ 
                id, name, 
                rule: document.getElementById('newRule').value, 
                level: id.length > 3 ? 2 : 1, 
                isFavorite: document.getElementById('isFav').checked, 
                examples: [] 
            });
            saveData();
            handleSearch();
            closeAddModal();
        }

        function toggleSettingsMenu() {
            document.getElementById('settingsMenu').classList.toggle('hidden');
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(rawData, null, 2)], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `ketoan_tt99.json`;
            link.click();
            toggleSettingsMenu();
        }

        function triggerImport() { document.getElementById('importFile').click(); toggleSettingsMenu(); }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    rawData = JSON.parse(e.target.result);
                    saveData();
                    handleSearch();
                } catch(e) { alert("Lỗi đọc file!"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
